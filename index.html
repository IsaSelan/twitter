<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitter Literário</title>
<style>
body{margin:0;font-family:Segoe UI, Arial;background:#f0f2f5;display:flex;}
.sidebar{width:250px;background:white;height:100vh;border-right:1px solid #ddd;padding:20px;}
.logo{font-size:30px;color:#1da1f2;font-weight:bold;margin-bottom:30px;}
.menu div{margin:15px 0;cursor:pointer;font-size:18px;}
.feed{flex:1;max-width:650px;background:white;border-left:1px solid #ddd;border-right:1px solid #ddd;}
.header{padding:15px;font-size:20px;font-weight:bold;border-bottom:1px solid #eee;}
.composer{padding:15px;border-bottom:1px solid #eee;}
textarea{width:100%;height:60px;border-radius:10px;border:1px solid #ccc;padding:10px;font-size:14px;}
button{margin-top:10px;background:#1da1f2;border:none;color:white;padding:8px 18px;border-radius:20px;cursor:pointer;}
.tweet{display:flex;gap:10px;padding:15px;border-bottom:1px solid #eee;}
.avatar{width:48px;height:48px;border-radius:50%;}
.content{flex:1;}
.name{font-weight:bold;}
.username{color:gray;font-size:14px;}
.tweetImg{width:100%;border-radius:10px;margin-top:10px;}
.book{width:140px;margin-top:10px;border-radius:8px;}
.summary{background:#f1f3f5;padding:10px;border-radius:10px;margin-top:8px;font-size:14px;}
.actions{margin-top:10px;display:flex;gap:25px;color:#1da1f2;cursor:pointer;}
.commentBox{margin-top:10px;}
.comment{background:#f5f7fa;padding:8px;border-radius:8px;margin-top:6px;display:flex;justify-content:space-between;}
.delete{color:red;cursor:pointer;font-size:12px;}
.trending{width:280px;padding:20px;}
.trendBox{background:white;border-radius:10px;padding:15px;}
.trend{padding:8px 0;color:#1da1f2;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">𝕏</div>
  <div class="menu">
    <div>🏠 Início</div>
    <div>🔎 Explorar</div>
    <div>👤 Perfil</div>
  </div>
</div>

<!-- FEED -->
<div class="feed">
  <div class="header">Twitter Literário</div>
  <div class="composer">
    <textarea id="tweetInput" placeholder="O que você acha? Use #hashtags"></textarea>
    <input type="file" id="imageInput">
    <button onclick="postTweet()">Tweetar</button>
  </div>
  <div id="timeline"></div>
</div>

<!-- TRENDING -->
<div class="trending">
  <div class="trendBox">
    <h3>🔥 Trending</h3>
    <div class="trend">#CapituInocente</div>
    <div class="trend">#CapituTraiu</div>
    <div class="trend">#DomCasmurro</div>
    <div class="trend">#LiteraturaBrasileira</div>
  </div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// 🔹 SUBSTITUA com suas chaves do Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDv_7f_zp_Q3p67J2_fwa0870u8PZ97G2U",
  authDomain: "twitter-literario.firebaseapp.com",
  projectId: "twitter-literario",
  storageBucket: "twitter-literario.firebasestorage.app",
  messagingSenderId: "63443793806",
  appId: "1:63443793806:web:e8a5d6d0e05ff79fde96df"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const timeline = document.getElementById("timeline");

// 🔹 Formatar hashtags
function formatHashtags(text){
  return text.replace(/#(\w+)/g,'<span style="color:#1da1f2;font-weight:bold">#$1</span>');
}

// 🔹 Carregar tweets em tempo real
onSnapshot(collection(db,"tweets"), snapshot => {
  timeline.innerHTML = "";
  snapshot.forEach(docSnap => {
    let t = docSnap.data();
    let id = docSnap.id;

    let commentsHTML = "";
    if(t.comments) {
      t.comments.forEach((c,ci)=>{
        commentsHTML += `
          <div class="comment">
            <span>${formatHashtags(c.text)}</span>
            <div>
              <span onclick="likeComment('${id}',${ci})">❤️ ${c.likes || 0}</span>
              <span class="delete" onclick="deleteComment('${id}',${ci})">🗑</span>
            </div>
          </div>`;
      });
    }

    let div = document.createElement("div");
    div.className = "tweet";
    div.innerHTML = `
      <img class="avatar" src="${t.avatar || 'https://img.freepik.com/vetores-premium/ilustracao-plana-vetorial-em-escala-de-cinza-avatar-perfil-de-usuario-icone-de-pessoa-imagem-de-perfil-de-silhueta-neutra_719432-2210.jpg'}">
      <div class="content">
        <div><span class="name">${t.user}</span> <span class="username">@${t.user.toLowerCase()}</span></div>
        <p>${formatHashtags(t.text)}</p>
        ${t.image ? `<img class="tweetImg" src="${t.image}">` : ""}
        ${t.book ? `<img class="book" src="${t.bookImage}">
        <div class="summary">${t.bookSummary}</div>` : ""}
        <div class="actions">
          <span onclick="likeTweet('${id}')">❤️ ${t.likes || 0}</span>
          <span onclick="addCommentPrompt('${id}')">💬 Comentar</span>
          <span onclick="deleteTweet('${id}')">🗑 Apagar</span>
        </div>
        <div class="commentBox">${commentsHTML}</div>
      </div>
    `;
    timeline.appendChild(div);
  });
});

// 🔹 Postar tweet
function postTweet(){
  let text = document.getElementById("tweetInput").value;
  let file = document.getElementById("imageInput").files[0];

  if(!text && !file) return;

  if(file){
    let reader = new FileReader();
    reader.onload = async function(){
      await addDoc(collection(db,"tweets"),{
        user:"Usuário",
        avatar:"https://img.freepik.com/vetores-premium/ilustracao-plana-vetorial-em-escala-de-cinza-avatar-perfil-de-usuario-icone-de-pessoa-imagem-de-perfil_719432-2210.jpg",
        text:text,
        image:reader.result,
        likes:0,
        comments:[],
        created:Date.now()
      });
      document.getElementById("tweetInput").value="";
      document.getElementById("imageInput").value="";
    }
    reader.readAsDataURL(file);
  } else {
    addDoc(collection(db,"tweets"),{
      user:"Usuário",
      avatar:"https://img.freepik.com/vetores-premium/ilustracao-plana-vetorial-em-escala-de-cinza-avatar-perfil-de-usuario-icone-de-pessoa-imagem-de-perfil_719432-2210.jpg",
      text:text,
      image:null,
      likes:0,
      comments:[],
      created:Date.now()
    });
    document.getElementById("tweetInput").value="";
  }
}

// 🔹 Likes e deletar
async function likeTweet(id){
  const tweetRef = doc(db,"tweets",id);
  const snap = await tweetRef.get();
  await updateDoc(tweetRef,{likes: (snap.data().likes || 0)+1 });
}

async function deleteTweet(id){
  if(confirm("Deseja apagar este tweet?")){
    await deleteDoc(doc(db,"tweets",id));
  }
}

// 🔹 Comentários
async function addCommentPrompt(id){
  let text = prompt("Digite seu comentário");
  if(!text) return;
  const tweetRef = doc(db,"tweets",id);
  const snap = await tweetRef.get();
  let comments = snap.data().comments || [];
  comments.push({text:"@usuario: "+text,likes:0});
  await updateDoc(tweetRef,{comments:comments});
}

async function likeComment(tweetId,commentIndex){
  const tweetRef = doc(db,"tweets",tweetId);
  const snap = await tweetRef.get();
  let comments = snap.data().comments || [];
  comments[commentIndex].likes = (comments[commentIndex].likes || 0)+1;
  await updateDoc(tweetRef,{comments:comments});
}

async function deleteComment(tweetId,commentIndex){
  const tweetRef = doc(db,"tweets",tweetId);
  const snap = await tweetRef.get();
  let comments = snap.data().comments || [];
  comments.splice(commentIndex,1);
  await updateDoc(tweetRef,{comments:comments});
}
</script>

</body>
</html>
