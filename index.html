<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Twitter Literário</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#eef1f5;
display:flex;
}

.sidebar{
width:220px;
background:white;
border-right:1px solid #ddd;
padding:20px;
}

.logo{
font-size:30px;
color:#1da1f2;
font-weight:bold;
margin-bottom:30px;
}

.feed{
flex:1;
max-width:650px;
background:white;
border-left:1px solid #ddd;
border-right:1px solid #ddd;
}

.header{
padding:15px;
font-size:20px;
font-weight:bold;
border-bottom:1px solid #eee;
}

.composer{
padding:15px;
border-bottom:1px solid #eee;
}

textarea{
width:100%;
height:70px;
border-radius:10px;
border:1px solid #ccc;
padding:10px;
}

button{
margin-top:10px;
background:#1da1f2;
border:none;
color:white;
padding:8px 20px;
border-radius:20px;
cursor:pointer;
}

.tweet{
display:flex;
gap:12px;
padding:15px;
border-bottom:1px solid #eee;
}

.avatar{
width:48px;
height:48px;
border-radius:50%;
}

.content{
flex:1;
}

.name{
font-weight:bold;
}

.username{
color:gray;
font-size:14px;
margin-left:5px;
}

.hashtag{
color:#1da1f2;
font-weight:bold;
}

.actions{
margin-top:10px;
display:flex;
gap:20px;
color:#1da1f2;
cursor:pointer;
}

</style>

</head>

<body>

<div class="sidebar">

<div class="logo">𝕏</div>

<div>🏠 Início</div>
<div>🔎 Explorar</div>
<div>👤 Perfil</div>

</div>

<div class="feed">

<div class="header">Twitter Literário</div>

<div class="composer">

<textarea id="tweetInput" placeholder="O que você acha? Use #hashtags"></textarea>

<button onclick="postTweet()">Tweetar</button>

</div>

<div id="timeline"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore,collection,addDoc,onSnapshot,deleteDoc,doc,updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "COLE_SUA_APIKEY",
authDomain: "SEU_PROJETO.firebaseapp.com",
projectId: "SEU_PROJETO",
storageBucket: "SEU_PROJETO.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const timeline = document.getElementById("timeline")

function formatHashtags(text){

return text.replace(/#(\w+)/g,'<span class="hashtag">#$1</span>')

}

window.postTweet = async function(){

let text = document.getElementById("tweetInput").value

if(!text) return

await addDoc(collection(db,"tweets"),{

user:"Usuário",
avatar:"https://cdn-icons-png.flaticon.com/512/149/149071.png",
text:text,
likes:0

})

document.getElementById("tweetInput").value=""

}

onSnapshot(collection(db,"tweets"),(snapshot)=>{

timeline.innerHTML=""

snapshot.forEach((docSnap)=>{

let t = docSnap.data()
let id = docSnap.id

let div = document.createElement("div")

div.className="tweet"

div.innerHTML=`

<img class="avatar" src="${t.avatar}">

<div class="content">

<div>

<span class="name">${t.user}</span>
<span class="username">@${t.user.toLowerCase()}</span>

</div>

<p>${formatHashtags(t.text)}</p>

<div class="actions">

<span onclick="likeTweet('${id}',${t.likes})">❤️ ${t.likes}</span>

<span onclick="deleteTweet('${id}')">🗑 Apagar</span>

</div>

</div>

`

timeline.appendChild(div)

})

})

window.likeTweet = async function(id,likes){

await updateDoc(doc(db,"tweets",id),{

likes:likes+1

})

}

window.deleteTweet = async function(id){

if(!confirm("Apagar tweet?")) return

await deleteDoc(doc(db,"tweets",id))

}

</script>

</body>
</html>
