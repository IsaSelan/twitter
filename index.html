<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitter Literário - Supabase</title>
<style>
body{margin:0;font-family:Segoe UI, Arial;background:#f0f2f5;display:flex;}
.sidebar{width:250px;background:white;height:100vh;border-right:1px solid #ddd;padding:20px;}
.logo{font-size:30px;color:#1da1f2;font-weight:bold;margin-bottom:30px;}
.menu div{margin:15px 0;cursor:pointer;font-size:18px;}
.feed{flex:1;max-width:650px;background:white;border-left:1px solid #ddd;border-right:1px solid #ddd;}
.header{padding:15px;font-size:20px;font-weight:bold;border-bottom:1px solid #eee;}
.composer{padding:15px;border-bottom:1px solid #eee;}
textarea{width:100%;height:60px;border-radius:10px;border:1px solid #ccc;padding:10px;font-size:14px;}
button{margin-top:10px;background:#1da1f2;border:none;color:white;padding:8px 18px;border-radius:20px;cursor:pointer;}
.tweet{display:flex;gap:10px;padding:15px;border-bottom:1px solid #eee;}
.avatar{width:48px;height:48px;border-radius:50%;}
.content{flex:1;}
.name{font-weight:bold;}
.username{color:gray;font-size:14px;}
.tweetImg{width:100%;border-radius:10px;margin-top:10px;}
.actions{margin-top:10px;display:flex;gap:25px;color:#1da1f2;cursor:pointer;}
.commentBox{margin-top:10px;}
.comment{background:#f5f7fa;padding:8px;border-radius:8px;margin-top:6px;display:flex;justify-content:space-between;}
.commentInput{width:80%;padding:5px;border-radius:5px;border:1px solid #ccc;}
.commentBtn{padding:5px 10px;border-radius:5px;background:#1da1f2;color:white;border:none;cursor:pointer;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">𝕏</div>
  <div class="menu">
    <div>🏠 Início</div>
    <div>🔎 Explorar</div>
    <div>👤 Perfil</div>
  </div>
</div>

<!-- FEED -->
<div class="feed">
  <div class="header">Twitter Literário</div>
  <div class="composer">
    <textarea id="tweetInput" placeholder="O que você acha? Use #hashtags"></textarea>
    <input type="file" id="imageInput">
    <button onclick="postTweet()">Tweetar</button>
  </div>
  <div id="timeline"></div>
</div>

<!-- SUPABASE -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://sgyowtyrawcxlfzomauc.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNneW93dHlyYXdjeGxmem9tYXVjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjUxNjUsImV4cCI6MjA4OTIwMTE2NX0.dwyq8XdNqXFFiHwf0VQfIH720vGYOmfYhdc_HN6aMt8";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const timeline = document.getElementById("timeline");

// Formatar hashtags
function formatHashtags(text){
  return text.replace(/#(\w+)/g,'<span style="color:#1da1f2;font-weight:bold">#$1</span>');
}

// Carregar tweets
async function loadTweets(){
  const { data: tweets, error } = await supabase
    .from('tweets')
    .select('*')
    .order('created_at',{ascending:false});

  if(error){ console.log(error); return; }
  timeline.innerHTML = "";

  tweets.forEach(t => {
    let div = document.createElement("div");
    div.className = "tweet";

    // Monta comentários
    let commentsHTML = "";
    if(t.comments) t.comments.forEach((c,idx)=>{
      commentsHTML += `<div class="comment">
        <span>${formatHashtags(c.text)}</span>
        <span onclick="likeComment(${t.id},${idx})">❤️ ${c.likes||0}</span>
      </div>`;
    });

    div.innerHTML = `
      <img class="avatar" src="${t.avatar || 'https://img.freepik.com/vetores-premium/avatar-neutro.png'}">
      <div class="content">
        <div><span class="name">${t.user}</span> <span class="username">@${t.user.toLowerCase()}</span></div>
        <p>${formatHashtags(t.text)}</p>
        ${t.image ? `<img class="tweetImg" src="${t.image}">` : ""}
        <div class="actions">
          <span onclick="likeTweet(${t.id})">❤️ ${t.likes||0}</span>
          <span onclick="showCommentBox(${t.id})">💬 Comentar</span>
        </div>
        <div class="commentBox" id="commentBox${t.id}">
          ${commentsHTML}
        </div>
      </div>
    `;
    timeline.appendChild(div);
  });
}

// Postar tweet
async function postTweet() {
  const text = document.getElementById("tweetInput").value.trim();
  const file = document.getElementById("imageInput").files[0];
  if(!text && !file) return;

  let imageData = null;
  if(file){
    const reader = new FileReader();
    reader.onload = async function(){
      imageData = reader.result;
      await supabase.from('tweets').insert([{
        user:"Usuário",
        avatar:"https://img.freepik.com/vetores-premium/avatar-neutro.png",
        text,
        image:imageData,
        likes:0,
        comments:[],
        created_at:new Date().toISOString()
      }]);
      document.getElementById("tweetInput").value="";
      document.getElementById("imageInput").value="";
      loadTweets();
    }
    reader.readAsDataURL(file);
  } else {
    await supabase.from('tweets').insert([{
      user:"Usuário",
      avatar:"https://img.freepik.com/vetores-premium/avatar-neutro.png",
      text,
      image:null,
      likes:0,
      comments:[],
      created_at:new Date().toISOString()
    }]);
    document.getElementById("tweetInput").value="";
    loadTweets();
  }
}

// Curtir tweet
async function likeTweet(id){
  const { data: tweet } = await supabase.from('tweets').select('*').eq('id',id).single();
  await supabase.from('tweets').update({likes:(tweet.likes||0)+1}).eq('id',id);
  loadTweets();
}

// Mostrar caixa de comentário
function showCommentBox(id){
  let box = document.getElementById("commentBox"+id);
  if(box.querySelector("input")) return; // já aberta
  let input = document.createElement("input");
  input.className = "commentInput";
  input.placeholder = "Comente...";
  let btn = document.createElement("button");
  btn.className = "commentBtn";
  btn.innerText = "Enviar";
  btn.onclick = ()=>postComment(id,input.value);
  box.appendChild(input);
  box.appendChild(btn);
}

// Postar comentário
async function postComment(tweetId,text){
  if(!text.trim()) return;
  const { data: tweet } = await supabase.from('tweets').select('*').eq('id',tweetId).single();
  let comments = tweet.comments || [];
  comments.push({text:"@usuario: "+text,likes:0});
  await supabase.from('tweets').update({comments}).eq('id',tweetId);
  loadTweets();
}

// Curtir comentário
async function likeComment(tweetId,index){
  const { data: tweet } = await supabase.from('tweets').select('*').eq('id',tweetId).single();
  let comments = tweet.comments || [];
  comments[index].likes = (comments[index].likes||0)+1;
  await supabase.from('tweets').update({comments}).eq('id',tweetId);
  loadTweets();
}

// Atualiza automático
loadTweets();
setInterval(loadTweets,3000);
</script>

</body>
</html>
